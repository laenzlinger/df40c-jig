<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="monospace" font-size="10">
  <!-- Title -->
  <text x="250" y="20" text-anchor="middle" font-size="14" font-weight="bold">DF40C Alignment Jig — Refined Design</text>

  <!-- === TOP VIEW === -->
  <text x="150" y="45" text-anchor="middle" font-size="12" font-weight="bold">Top View</text>

  <!-- Jig PCB outline -->
  <rect x="40" y="55" width="220" height="160" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="3"/>
  <text x="50" y="70" font-size="8" fill="#388e3c">Jig PCB (1.0mm FR4)</text>

  <!-- Connector slot 1 -->
  <rect x="70" y="90" width="130" height="14" fill="white" stroke="#795548" stroke-width="1.5"/>
  <rect x="72" y="92" width="126" height="10" fill="#424242" rx="1"/>
  <text x="135" y="100" text-anchor="middle" font-size="7" fill="white">DF40C connector 1</text>

  <!-- Connector slot 2 -->
  <rect x="70" y="150" width="130" height="14" fill="white" stroke="#795548" stroke-width="1.5"/>
  <rect x="72" y="152" width="126" height="10" fill="#424242" rx="1"/>
  <text x="135" y="160" text-anchor="middle" font-size="7" fill="white">DF40C connector 2</text>

  <!-- Press-fit dowel pins — DIAGONAL placement -->
  <circle cx="55" cy="80" r="5" fill="#ffc107" stroke="#f57f17" stroke-width="1.5"/>
  <text x="55" y="73" text-anchor="middle" font-size="7" fill="#f57f17">pin 1</text>

  <circle cx="245" cy="175" r="5" fill="#ffc107" stroke="#f57f17" stroke-width="1.5"/>
  <text x="245" y="190" text-anchor="middle" font-size="7" fill="#f57f17">pin 2</text>

  <!-- Diagonal line showing constraint -->
  <line x1="55" y1="80" x2="245" y2="175" stroke="#f57f17" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="170" y="118" text-anchor="middle" font-size="7" fill="#f57f17" transform="rotate(-25,170,118)">diagonal = constrains rotation</text>

  <!-- Relief cutouts -->
  <rect x="210" y="80" width="30" height="25" fill="white" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="225" y="95" text-anchor="middle" font-size="6" fill="#999">relief</text>

  <rect x="210" y="145" width="30" height="25" fill="white" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="225" y="160" text-anchor="middle" font-size="6" fill="#999">relief</text>

  <!-- === CROSS SECTION === -->
  <text x="390" y="45" text-anchor="middle" font-size="12" font-weight="bold">Cross Section</text>

  <!-- Carrier PCB -->
  <rect x="300" y="250" width="180" height="12" fill="#b39ddb" stroke="#4527a0" stroke-width="1.5"/>
  <text x="390" y="259" text-anchor="middle" font-size="8" fill="white">Carrier PCB</text>

  <!-- Paste -->
  <rect x="345" y="247" width="8" height="3" fill="#ef5350"/>
  <rect x="360" y="247" width="8" height="3" fill="#ef5350"/>
  <rect x="375" y="247" width="8" height="3" fill="#ef5350"/>
  <rect x="390" y="247" width="8" height="3" fill="#ef5350"/>
  <rect x="405" y="247" width="8" height="3" fill="#ef5350"/>
  <rect x="420" y="247" width="8" height="3" fill="#ef5350"/>
  <text x="440" y="249" font-size="7" fill="#ef5350">paste</text>

  <!-- Connector body -->
  <rect x="348" y="235" width="70" height="12" fill="#424242" stroke="#212121" stroke-width="1" rx="1"/>
  <text x="383" y="243" text-anchor="middle" font-size="7" fill="white">DF40C</text>

  <!-- Connector pins -->
  <line x1="353" y1="247" x2="353" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="358" y1="247" x2="358" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="363" y1="247" x2="363" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="368" y1="247" x2="368" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="393" y1="247" x2="393" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="398" y1="247" x2="398" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="403" y1="247" x2="403" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="408" y1="247" x2="408" y2="244" stroke="#666" stroke-width="1"/>

  <!-- Jig borders (cross section) -->
  <rect x="335" y="225" width="10" height="22" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <rect x="421" y="225" width="10" height="22" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="340" y="222" text-anchor="middle" font-size="7" fill="#388e3c">jig</text>
  <text x="426" y="222" text-anchor="middle" font-size="7" fill="#388e3c">jig</text>

  <!-- Dowel pin (cross section) -->
  <rect x="313" y="220" width="4" height="48" fill="#ffc107" stroke="#f57f17" stroke-width="1" rx="1"/>
  <text x="315" y="215" text-anchor="middle" font-size="7" fill="#f57f17">pin</text>

  <!-- Press-fit annotation -->
  <text x="295" y="233" text-anchor="middle" font-size="6" fill="#f57f17">press-fit</text>
  <text x="295" y="240" text-anchor="middle" font-size="6" fill="#f57f17">Ø0.95mm</text>

  <!-- Clearance hole annotation -->
  <text x="295" y="257" text-anchor="middle" font-size="6" fill="#4527a0">clearance</text>
  <text x="295" y="264" text-anchor="middle" font-size="6" fill="#4527a0">Ø1.05mm</text>

  <!-- Gap annotation -->
  <text x="383" y="230" text-anchor="middle" font-size="7" fill="#d32f2f">connector constrained by slot</text>

  <!-- === WORKFLOW === -->
  <text x="390" y="290" text-anchor="middle" font-size="10" font-weight="bold">Workflow:</text>
  <text x="310" y="305" font-size="8">1. Stencil paste (all pads)</text>
  <text x="310" y="318" font-size="8">2. Drop jig on (pins → holes)</text>
  <text x="310" y="331" font-size="8">3. Drop connectors into slots</text>
  <text x="310" y="344" font-size="8">4. Place other components</text>
  <text x="310" y="357" font-size="8">5. Reflow (jig stays on)</text>
  <text x="310" y="370" font-size="8">6. Remove jig after cooldown</text>

  <!-- Specs -->
  <text x="150" y="235" text-anchor="middle" font-size="9" font-weight="bold">Specs:</text>
  <text x="150" y="248" text-anchor="middle" font-size="8">Dowel: Ø1.0mm stainless steel</text>
  <text x="150" y="261" text-anchor="middle" font-size="8">2 pins, diagonal placement</text>
  <text x="150" y="274" text-anchor="middle" font-size="8">Accuracy: ±0.075mm</text>
</svg>
